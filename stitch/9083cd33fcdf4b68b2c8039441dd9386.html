<style>
        .material-symbols-outlined {
          font-variation-settings:

<body class="bg-background text-on-background min-h-screen font-body-md" data-surface-id="SURF_TERCIH_PAGE">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface docked full-width top-0 border-b border-outline-variant dark:border-outline flat no shadows cursor-pointer active:opacity-80">
<div class="flex justify-between items-center px-container-padding h-16 w-full max-w-7xl mx-auto">
<div class="font-headline-sm text-headline-sm font-bold text-primary dark:text-primary-fixed-dim">
                Tercih Hazır Aracı
            </div>
<div class="hidden"></div>
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="settings">settings</span>
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="help">help</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="max-w-7xl mx-auto px-container-padding py-stack-lg flex flex-col items-center justify-center min-h-[calc(100vh-64px)] space-y-stack-lg">
<div class="bg-surface border border-outline-variant rounded-xl p-stack-lg w-full max-w-md flex flex-col items-center text-center shadow-sm">
<h1 class="font-headline-md text-headline-md mb-stack-md text-on-surface">Durum Kontrolü</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg">
                Mevcut tercih durumunuzu aşağıdan görebilir ve güncelleyebilirsiniz.
            </p>
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-stack-md w-full mb-stack-lg flex items-center justify-between">
<span class="font-body-sm text-body-sm text-on-surface-variant">Sistem Durumu:</span>
<span class="font-status-tag text-status-tag text-on-surface bg-surface-container-highest px-3 py-1 rounded-full" id="status-display">
                    Bekleniyor
                </span>
</div>
<button aria-label="Hazır" class="bg-primary text-on-primary font-body-md text-body-md px-8 py-3 rounded w-full hover:bg-primary-container transition-colors duration-200" data-action="ACT_HAZIR_BUTTON_CLICK" id="hazir-button" role="button">
                Hazır
            </button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const statusDisplay = document.getElementById('status-display');
            const hazirButton = document.getElementById('hazir-button');
            
            // 1. On page load, checks localStorage for 'hazır' status and displays it.
            const currentStatus = localStorage.getItem('tercih_status');
            if (currentStatus === 'Hazır') {
                updateStatusDisplay('Hazır');
            }

            // 2. On ACT_HAZIR_BUTTON_CLICK, sets the status to 'Hazır' in localStorage and updates the display.
            hazirButton.addEventListener('click', (e) => {
                e.preventDefault(); // 3. Ensures the user stays on the current page.
                localStorage.setItem('tercih_status', 'Hazır');
                updateStatusDisplay('Hazır');
            });

            function updateStatusDisplay(status) {
                statusDisplay.textContent = status;
                if(status === 'Hazır') {
                    // Update styling to reflect ready state (using secondary green per guidelines)
                    statusDisplay.classList.remove('bg-surface-container-highest', 'text-on-surface');
                    statusDisplay.classList.add('bg-secondary-fixed', 'text-on-secondary-fixed');
                    
                    // Add subtle glow to card to indicate active state
                    statusDisplay.closest('.border-outline-variant').classList.replace('border-outline-variant', 'border-primary');
                    statusDisplay.closest('.border-outline-variant').classList.add('border-2');
                }
            }
        });
    </script>
</body></html>
